title: "[Idea]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this category for early ideas, experiments, or broader suggestions that are not ready to become a precise feature request.
        Discussions are public. Do not include private files, local paths, keys, personal contact details, sensitive screenshots, or anything you do not want published.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What is your idea?
      placeholder: Share the idea in a few sentences.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Optional. Share only context that is safe to publish publicly.
