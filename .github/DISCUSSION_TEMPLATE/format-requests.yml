title: "[Format]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this category to request support for new input or output formats.
  - type: input
    id: format
    attributes:
      label: Format name
      description: Which file format should Multi-Converter support?
      placeholder: "Example: AVIF, HEIC, EPUB, FLAC"
    validations:
      required: true
  - type: dropdown
    id: direction
    attributes:
      label: Conversion direction
      description: What do you need?
      options:
        - Import this format
        - Export to this format
        - Both import and export
        - I am not sure
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this format matters
      description: What workflow or file source needs this format?
      placeholder: Explain where these files come from and what you want to convert them into.
    validations:
      required: true
  - type: textarea
    id: samples
    attributes:
      label: Sample files or references
      description: Optional. Link public samples only, or attach files that are safe to publish.
