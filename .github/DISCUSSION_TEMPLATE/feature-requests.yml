title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this category to request a specific Multi-Converter feature or workflow improvement.
        Discussions are public. Do not include private files, local paths, keys, personal contact details, sensitive screenshots, or anything you do not want published.
  - type: textarea
    id: feature
    attributes:
      label: Feature request
      description: What should Multi-Converter add or improve?
      placeholder: Describe the feature clearly.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: When would this help you?
      placeholder: Explain the situation where this would be useful.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details or examples
      description: Optional. Add only public-safe examples, screenshots, or related tools if useful.
