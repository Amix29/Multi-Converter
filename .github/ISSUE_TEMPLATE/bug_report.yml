name: Bug
description: Report a problem, regression, or unexpected behavior.
title: "[Bug]: "
labels: ["Bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in Multi-Converter. Please do not include private files, local paths, keys, or sensitive screenshots.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Multi-Converter version
      description: This is prefilled when the report is opened from the app.
      placeholder: "Example: 1.0.2"
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      description: This is prefilled when the report is opened from the app.
      placeholder: "Example: Windows"
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or files
      description: Optional. Attach or link only files that are safe to publish publicly.
