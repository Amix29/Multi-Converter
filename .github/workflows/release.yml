name: Release

on:
  workflow_dispatch:
    inputs:
      include_macos:
        description: "Include the already uploaded and manually verified macOS universal DMG asset"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      include_macos: ${{ steps.mode.outputs.include_macos }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.include_macos }}" == "true" ]]; then
            echo "include_macos=true" >> "$GITHUB_OUTPUT"
          else
            echo "include_macos=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release notes before release runners
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v$version"
          include_macos="${{ steps.mode.outputs.include_macos }}"
          notes_file="$RUNNER_TEMP/release-notes.md"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq ".body" > "$notes_file"
          node scripts/validate-release-notes.mjs --version "$version" --notes-file "$notes_file" --include-macos "$include_macos" --min-length 200

      - name: Require V1.0.5 macOS release readiness
        if: ${{ steps.mode.outputs.include_macos == 'true' }}
        run: npm run status:v1.0.5 -- --require-ready

  macos-dmg-verify:
    name: macOS DMG verification
    needs: release-preflight
    if: ${{ needs.release-preflight.outputs.include_macos == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Download pre-uploaded macOS DMG
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"
          macos_dmg_name="Multi-Converter_${version}_macos-universal.dmg"
          macos_dmg_dir="$RUNNER_TEMP/mc-release-macos-dmg"
          rm -rf "$macos_dmg_dir"
          mkdir -p "$macos_dmg_dir"
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern "$macos_dmg_name" --dir "$macos_dmg_dir"
          test -s "$macos_dmg_dir/$macos_dmg_name"
          echo "MACOS_DMG_PATH=$macos_dmg_dir/$macos_dmg_name" >> "$GITHUB_ENV"

      - name: Verify macOS DMG on macOS
        shell: bash
        run: npm run verify:macos-dmg -- --version "${{ steps.version.outputs.version }}" --dmg "$MACOS_DMG_PATH"

  windows:
    needs:
      - release-preflight
      - macos-dmg-verify
    if: ${{ always() && needs.release-preflight.result == 'success' && (needs.macos-dmg-verify.result == 'success' || needs.macos-dmg-verify.result == 'skipped') }}
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-release-

      - uses: actions/cache@v4
        with:
          path: src-tauri/bundled-engines
          key: ${{ runner.os }}-bundled-engines-${{ hashFiles('src-tauri/engines-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-bundled-engines-

      - id: cargo-audit-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit.exe
          key: ${{ runner.os }}-cargo-audit-bin-v1

      - run: npm ci
      - run: npm audit --omit=dev
      - run: cargo install cargo-audit --locked
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'

      - id: version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Validate release tag
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne $tag) {
            throw "Git tag ${{ github.ref_name }} does not match package version $version."
          }

      - name: Read GitHub release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INCLUDE_MACOS: ${{ github.event_name == 'workflow_dispatch' && inputs.include_macos }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $includeMacos = $env:INCLUDE_MACOS -eq "true"
          $body = gh release view $tag --repo $env:GITHUB_REPOSITORY --json body --jq ".body"
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($body)) {
            throw "Missing GitHub release notes for $tag. Create or edit the release notes directly on GitHub in English, then rerun this workflow."
          }
          $notesFile = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $includeMacosArg = if ($includeMacos) { "true" } else { "false" }
          Set-Content -LiteralPath $notesFile -Value $body -Encoding utf8
          node scripts/validate-release-notes.mjs --version $version --notes-file $notesFile --include-macos $includeMacosArg --min-length 200
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $delimiter = "MC_RELEASE_NOTES_$([guid]::NewGuid().ToString("N"))"
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_NOTES_BODY<<$delimiter"
          Add-Content -Path $env:GITHUB_ENV -Value $body
          Add-Content -Path $env:GITHUB_ENV -Value $delimiter

      - run: npm run prepare:bundled-engines
      - run: npm run check
      - run: npm run fmt:rust:check
      - run: npm run clippy:rust
      - run: npm run audit:rust
      - run: npm run test:rust
      - run: npm run test:conversions
      - run: npm run test:pdfium-wrapper
      - run: npm run clippy:pdfium-wrapper
      - run: npm run tauri:build

      - name: Prepare and validate clean release assets
        id: assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INCLUDE_MACOS: ${{ github.event_name == 'workflow_dispatch' && inputs.include_macos }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $includeMacos = $env:INCLUDE_MACOS -eq "true"
          $assetDir = Join-Path $env:RUNNER_TEMP "mc-release-assets\$tag"
          $platform = "windows"

          if ($includeMacos) {
            $macosDmgName = "Multi-Converter_${version}_macos-universal.dmg"
            $macosDmgDir = Join-Path $env:RUNNER_TEMP "mc-release-macos-dmg"
            Remove-Item -LiteralPath $macosDmgDir -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path $macosDmgDir | Out-Null
            gh release download $tag --repo $env:GITHUB_REPOSITORY --pattern $macosDmgName --dir $macosDmgDir
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
            $macosDmgPath = Join-Path $macosDmgDir $macosDmgName
            if (-not (Test-Path -LiteralPath $macosDmgPath)) {
              throw "Missing pre-uploaded macOS DMG asset on release $tag: $macosDmgName"
            }
            npm run prepare:release-assets -- --version $version --dir $assetDir --notes-env RELEASE_NOTES_BODY --macos-dmg $macosDmgPath
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
            $platform = "all"
          } else {
            npm run prepare:release-assets -- --version $version --dir $assetDir --notes-env RELEASE_NOTES_BODY
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          npm run validate:release-assets -- --version $version --dir $assetDir --platform $platform
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          "dir=$assetDir" >> $env:GITHUB_OUTPUT
          "platform=$platform" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release with exact assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $assetDir = "${{ steps.assets.outputs.dir }}"
          $platform = "${{ steps.assets.outputs.platform }}"
          $installerName = "Multi-Converter_${version}_x64-setup.exe"
          $expectedAssets = @(
            "latest.json",
            $installerName,
            "$installerName.sig",
            "$installerName.sha256",
            "Multi-Converter_windows-x64_setup.exe"
          )
          if ($platform -eq "all") {
            $expectedAssets += "Multi-Converter_${version}_macos-universal.dmg"
          }

          gh release edit $tag --repo $env:GITHUB_REPOSITORY --title "Multi-Converter $tag" --latest

          $existingAssets = gh release view $tag --repo $env:GITHUB_REPOSITORY --json assets --jq ".assets[].name"
          foreach ($asset in $existingAssets) {
            if ($asset -and $asset -notin $expectedAssets) {
              gh release delete-asset $tag $asset --repo $env:GITHUB_REPOSITORY -y
            }
          }

          foreach ($asset in $expectedAssets) {
            gh release upload $tag (Join-Path $assetDir $asset) --repo $env:GITHUB_REPOSITORY --clobber
          }

      - name: Verify published release asset list
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $platform = "${{ steps.assets.outputs.platform }}"
          $expectedAssets = @(
            "latest.json",
            "Multi-Converter_${version}_x64-setup.exe",
            "Multi-Converter_${version}_x64-setup.exe.sig",
            "Multi-Converter_${version}_x64-setup.exe.sha256",
            "Multi-Converter_windows-x64_setup.exe"
          )
          if ($platform -eq "all") {
            $expectedAssets += "Multi-Converter_${version}_macos-universal.dmg"
          }
          $expectedAssets = $expectedAssets | Sort-Object
          $actualAssets = @(gh release view $tag --repo $env:GITHUB_REPOSITORY --json assets --jq ".assets[].name" | Sort-Object)
          if (Compare-Object -ReferenceObject $expectedAssets -DifferenceObject $actualAssets) {
            throw "Published release assets do not exactly match the required asset list."
          }
