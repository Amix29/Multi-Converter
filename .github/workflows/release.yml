name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-release-

      - run: npm ci
      - run: npm audit --omit=dev
      - run: cargo install cargo-audit --locked

      - id: version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Validate release tag and notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne $tag) {
            throw "Git tag ${{ github.ref_name }} does not match package version $version."
          }
          $notes = "docs/RELEASE_NOTES_v$version.md"
          if (-not (Test-Path -LiteralPath $notes)) {
            throw "Missing release notes file: $notes"
          }

      - run: npm run check
      - run: npm run fmt:rust:check
      - run: npm run clippy:rust
      - run: npm run audit:rust
      - run: npm run test:rust
      - run: npm run test:conversions
      - run: npm run test:pdfium-wrapper
      - run: npm run clippy:pdfium-wrapper
      - run: npm run tauri:build

      - name: Prepare and validate clean release assets
        id: assets
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $assetDir = Join-Path $env:RUNNER_TEMP "mc-release-assets\$tag"
          npm run prepare:release-assets -- --version $version --dir $assetDir
          npm run validate:release-assets -- --version $version --dir $assetDir
          "dir=$assetDir" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release with exact assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $assetDir = "${{ steps.assets.outputs.dir }}"
          $installerName = "Multi-Converter_${version}_x64-setup.exe"
          $expectedAssets = @(
            "latest.json",
            $installerName,
            "$installerName.sig",
            "$installerName.sha256",
            "Multi-Converter_windows-x64_setup.exe"
          )

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title "Multi-Converter $tag" --notes-file "docs/RELEASE_NOTES_v$version.md" --latest
          } else {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --verify-tag --title "Multi-Converter $tag" --notes-file "docs/RELEASE_NOTES_v$version.md" --latest
          }

          $existingAssets = gh release view $tag --repo $env:GITHUB_REPOSITORY --json assets --jq ".assets[].name"
          foreach ($asset in $existingAssets) {
            if ($asset -and $asset -notin $expectedAssets) {
              gh release delete-asset $tag $asset --repo $env:GITHUB_REPOSITORY -y
            }
          }

          foreach ($asset in $expectedAssets) {
            gh release upload $tag (Join-Path $assetDir $asset) --repo $env:GITHUB_REPOSITORY --clobber
          }

      - name: Verify published release asset list
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $expectedAssets = @(
            "latest.json",
            "Multi-Converter_${version}_x64-setup.exe",
            "Multi-Converter_${version}_x64-setup.exe.sig",
            "Multi-Converter_${version}_x64-setup.exe.sha256",
            "Multi-Converter_windows-x64_setup.exe"
          ) | Sort-Object
          $actualAssets = @(gh release view $tag --repo $env:GITHUB_REPOSITORY --json assets --jq ".assets[].name" | Sort-Object)
          if (Compare-Object -ReferenceObject $expectedAssets -DifferenceObject $actualAssets) {
            throw "Published release assets do not exactly match the required asset list."
          }
