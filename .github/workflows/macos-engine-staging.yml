name: macOS Engine Staging

on:
  push:
    branches:
      - codex/test
    paths:
      - ".github/workflows/macos-engine-staging.yml"
      - "scripts/prepare-ffmpeg-engine-macos.mjs"
      - "scripts/prepare-pdfium-engine-macos.mjs"
      - "scripts/prepare-libreoffice-engine-macos.mjs"
      - "scripts/prepare-pandoc-engine-macos.mjs"
      - "scripts/prepare-libvips-engine-macos.mjs"
      - "scripts/prepare-libvips-macos-release-inputs.mjs"
      - "scripts/package-engines.mjs"
      - "tools/engine-packages.macos.config.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      output_release_tag:
        description: "Optional test release tag that will receive the staged macOS engine assets"
        required: false
        default: ""
        type: string
      ffmpeg_aarch64_archive_url:
        description: "Maintainer-approved Apple Silicon FFmpeg archive URL"
        required: true
        type: string
      ffmpeg_aarch64_archive_sha256:
        description: "SHA-256 for the Apple Silicon FFmpeg or combined FFmpeg/ffprobe archive"
        required: true
        type: string
      ffprobe_aarch64_archive_url:
        description: "Optional maintainer-approved Apple Silicon FFprobe archive URL when FFprobe is separate"
        required: false
        default: ""
        type: string
      ffprobe_aarch64_archive_sha256:
        description: "SHA-256 for the separate Apple Silicon FFprobe archive"
        required: false
        default: ""
        type: string
      ffmpeg_x86_64_archive_url:
        description: "Maintainer-approved Intel FFmpeg or combined FFmpeg/ffprobe archive URL"
        required: true
        type: string
      ffmpeg_x86_64_archive_sha256:
        description: "SHA-256 for the Intel FFmpeg or combined FFmpeg/ffprobe archive"
        required: true
        type: string
      ffprobe_x86_64_archive_url:
        description: "Optional maintainer-approved Intel FFprobe archive URL when FFprobe is separate"
        required: false
        default: ""
        type: string
      ffprobe_x86_64_archive_sha256:
        description: "SHA-256 for the separate Intel FFprobe archive"
        required: false
        default: ""
        type: string
      libvips_release_tag:
        description: "Release tag containing portable libvips macOS runtime archives"
        required: false
        default: ""
        type: string
      libvips_runtime_run_id:
        description: "Optional macOS libvips Runtime workflow run ID containing portable runtime artifacts"
        required: false
        default: ""
        type: string
      libvips_aarch64_asset:
        description: "Apple Silicon libvips portable archive asset name"
        required: true
        default: "libvips-macos-aarch64.tar.gz"
        type: string
      libvips_x86_64_asset:
        description: "Intel libvips portable archive asset name"
        required: true
        default: "libvips-macos-x86_64.tar.gz"
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: macos-engine-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stage:
    name: Stage macOS engine release assets
    if: ${{ github.event_name == 'workflow_dispatch' || vars.MC_ENABLE_MACOS_ENGINE_STAGING == '1' }}
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MULTI_CONVERTER_ENGINE_PLATFORM: macos-universal
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FFMPEG_MACOS_AARCH64_ARCHIVE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.ffmpeg_aarch64_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_FFMPEG_MACOS_AARCH64_ARCHIVE_URL || '' }}
      FFMPEG_MACOS_AARCH64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.ffmpeg_aarch64_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_FFMPEG_MACOS_AARCH64_ARCHIVE_SHA256 || '' }}
      FFPROBE_MACOS_AARCH64_ARCHIVE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.ffprobe_aarch64_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_FFPROBE_MACOS_AARCH64_ARCHIVE_URL || '' }}
      FFPROBE_MACOS_AARCH64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.ffprobe_aarch64_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_FFPROBE_MACOS_AARCH64_ARCHIVE_SHA256 || '' }}
      FFMPEG_MACOS_X86_64_ARCHIVE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.ffmpeg_x86_64_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_FFMPEG_MACOS_X86_64_ARCHIVE_URL || '' }}
      FFMPEG_MACOS_X86_64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.ffmpeg_x86_64_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_FFMPEG_MACOS_X86_64_ARCHIVE_SHA256 || '' }}
      FFPROBE_MACOS_X86_64_ARCHIVE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.ffprobe_x86_64_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_FFPROBE_MACOS_X86_64_ARCHIVE_URL || '' }}
      FFPROBE_MACOS_X86_64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.ffprobe_x86_64_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_FFPROBE_MACOS_X86_64_ARCHIVE_SHA256 || '' }}
      LIBVIPS_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_release_tag || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_MACOS_RELEASE_TAG || '' }}
      LIBVIPS_RUNTIME_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_runtime_run_id || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_MACOS_RUNTIME_RUN_ID || '' }}
      LIBVIPS_AARCH64_ASSET: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_aarch64_asset || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_MACOS_AARCH64_ASSET || 'libvips-macos-aarch64.tar.gz' }}
      LIBVIPS_X86_64_ASSET: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_x86_64_asset || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_MACOS_X86_64_ASSET || 'libvips-macos-x86_64.tar.gz' }}
      OUTPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.output_release_tag || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-macos-engine-staging-cargo-registry-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-macos-engine-staging-cargo-registry-v2-
            ${{ runner.os }}-cargo-registry-v2-

      - run: npm ci

      - name: Configure Cargo target directory
        run: echo "CARGO_TARGET_DIR=$RUNNER_TEMP/mc-cargo-target-macos-engines" >> "$GITHUB_ENV"

      - name: Prepare FFmpeg and ffprobe
        run: npm run prepare:ffmpeg-engine:macos

      - name: Prepare upstream advanced engines
        run: npm run prepare:macos-upstream-engines

      - name: Validate libvips input source
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$LIBVIPS_RELEASE_TAG"
          run_id="$LIBVIPS_RUNTIME_RUN_ID"
          if [[ -n "$release_tag" && -n "$run_id" ]]; then
            echo "Provide only one libvips input source: libvips_release_tag or libvips_runtime_run_id." >&2
            exit 1
          fi
          if [[ -z "$release_tag" && -z "$run_id" ]]; then
            echo "Provide libvips_runtime_run_id from a successful macOS libvips Runtime run, or libvips_release_tag from an intentional test release." >&2
            exit 1
          fi

      - name: Prepare portable libvips inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$LIBVIPS_RUNTIME_RUN_ID" ]]; then
            artifact_dir="$RUNNER_TEMP/mc-libvips-runtime-artifacts"
            mkdir -p "$artifact_dir/aarch64" "$artifact_dir/x86_64"
            gh run download "$LIBVIPS_RUNTIME_RUN_ID" --repo "$GITHUB_REPOSITORY" --name libvips-macos-aarch64 --dir "$artifact_dir/aarch64"
            gh run download "$LIBVIPS_RUNTIME_RUN_ID" --repo "$GITHUB_REPOSITORY" --name libvips-macos-x86_64 --dir "$artifact_dir/x86_64"
            aarch64_archive="$(find "$artifact_dir/aarch64" -type f -name 'libvips-macos-aarch64.tar.gz' -print -quit)"
            x86_64_archive="$(find "$artifact_dir/x86_64" -type f -name 'libvips-macos-x86_64.tar.gz' -print -quit)"
            test -n "$aarch64_archive"
            test -n "$x86_64_archive"
            npm run prepare:libvips-macos-release-inputs -- \
              --aarch64-archive "$aarch64_archive" \
              --x86_64-archive "$x86_64_archive"
          else
            npm run prepare:libvips-macos-release-inputs -- --tag "$LIBVIPS_RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --aarch64-asset "$LIBVIPS_AARCH64_ASSET" \
              --x86_64-asset "$LIBVIPS_X86_64_ASSET"
          fi

      - name: Prepare libvips
        run: npm run prepare:libvips-engine:macos

      - name: Package macOS engine archives
        run: |
          set -euo pipefail
          if [[ -n "$OUTPUT_RELEASE_TAG" ]]; then
            base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${OUTPUT_RELEASE_TAG}/"
          else
            base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/macos-engine-staging-${GITHUB_RUN_ID}/"
          fi
          npm run package:macos-engines -- --release-base-url "$base_url"

      - name: Collect staged assets
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/mc-macos-engine-assets"
          cp dist-engines-macos/*.zip "$RUNNER_TEMP/mc-macos-engine-assets/"
          cp dist-engines-macos/engines-manifest.json "$RUNNER_TEMP/mc-macos-engine-assets/"
          cp engine-sources/macos-universal/ffmpeg/bin/ffmpeg-aarch64-apple-darwin "$RUNNER_TEMP/mc-macos-engine-assets/"
          cp engine-sources/macos-universal/ffmpeg/bin/ffmpeg-x86_64-apple-darwin "$RUNNER_TEMP/mc-macos-engine-assets/"
          cp engine-sources/macos-universal/ffmpeg/bin/ffmpeg-universal-apple-darwin "$RUNNER_TEMP/mc-macos-engine-assets/"
          cp engine-sources/macos-universal/ffprobe/bin/ffprobe-aarch64-apple-darwin "$RUNNER_TEMP/mc-macos-engine-assets/"
          cp engine-sources/macos-universal/ffprobe/bin/ffprobe-x86_64-apple-darwin "$RUNNER_TEMP/mc-macos-engine-assets/"
          cp engine-sources/macos-universal/ffprobe/bin/ffprobe-universal-apple-darwin "$RUNNER_TEMP/mc-macos-engine-assets/"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-engine-assets
          path: ${{ runner.temp }}/mc-macos-engine-assets
          if-no-files-found: error

      - name: Upload staged assets to a test release
        if: ${{ env.OUTPUT_RELEASE_TAG != '' }}
        run: |
          set -euo pipefail
          tag="$OUTPUT_RELEASE_TAG"
          gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes "macOS engine staging assets for Multi-Converter testing." --prerelease || true
          gh release upload "$tag" "$RUNNER_TEMP"/mc-macos-engine-assets/* --repo "$GITHUB_REPOSITORY" --clobber
