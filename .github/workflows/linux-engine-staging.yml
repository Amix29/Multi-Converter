name: Linux Engine Staging

on:
  push:
    branches:
      - codex/test
    paths:
      - ".github/workflows/linux-engine-staging.yml"
      - "scripts/prepare-pdfium-engine-linux.mjs"
      - "scripts/prepare-libreoffice-engine-linux.mjs"
      - "scripts/prepare-pandoc-engine-linux.mjs"
      - "scripts/prepare-libvips-engine-linux.mjs"
      - "scripts/prepare-linux-engine-sources.mjs"
      - "scripts/package-engines.mjs"
      - "scripts/lib/download-integrity.mjs"
      - "tools/engine-packages.linux.config.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      output_release_tag:
        description: "Optional test release tag that will receive the staged Linux engine assets"
        required: false
        default: ""
        type: string
      pdfium_archive_url:
        description: "Optional maintainer-approved Linux x64 PDFium source-tree archive URL; leave empty when using upstream PDFium"
        required: false
        default: ""
        type: string
      pdfium_archive_sha256:
        description: "SHA-256 for the Linux x64 PDFium source-tree archive"
        required: false
        default: ""
        type: string
      pdfium_upstream_sha256:
        description: "SHA-256 for the upstream pdfium-linux-x64.tgz archive when pdfium_archive_url is empty"
        required: false
        default: ""
        type: string
      libreoffice_archive_url:
        description: "Optional maintainer-approved Linux x64 LibreOffice source-tree archive URL; leave empty when using upstream LibreOffice"
        required: false
        default: ""
        type: string
      libreoffice_archive_sha256:
        description: "SHA-256 for the Linux x64 LibreOffice source-tree archive"
        required: false
        default: ""
        type: string
      libreoffice_upstream_sha256:
        description: "SHA-256 for the official LibreOffice Linux x86-64 deb archive when libreoffice_archive_url is empty"
        required: false
        default: ""
        type: string
      pandoc_archive_url:
        description: "Optional maintainer-approved Linux x64 Pandoc source-tree archive URL; leave empty when using upstream Pandoc"
        required: false
        default: ""
        type: string
      pandoc_archive_sha256:
        description: "SHA-256 for the Linux x64 Pandoc source-tree archive"
        required: false
        default: ""
        type: string
      pandoc_upstream_sha256:
        description: "SHA-256 for the upstream pandoc linux-amd64.tar.gz archive when pandoc_archive_url is empty"
        required: false
        default: ""
        type: string
      libvips_archive_url:
        description: "Optional maintainer-approved Linux x64 libvips source-tree archive URL; leave empty when building from Ubuntu apt"
        required: false
        default: ""
        type: string
      libvips_archive_sha256:
        description: "SHA-256 for the Linux x64 libvips source-tree archive"
        required: false
        default: ""
        type: string
      libvips_apt_runtime:
        description: "Build a portable Linux libvips runtime from Ubuntu apt instead of using a source-tree archive"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: linux-engine-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stage:
    name: Stage Linux engine release assets
    if: ${{ github.event_name == 'workflow_dispatch' || vars.MC_ENABLE_LINUX_ENGINE_STAGING == '1' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MULTI_CONVERTER_ENGINE_PLATFORM: linux-x64
      MC_PDFIUM_LINUX_X64_ARCHIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.pdfium_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_PDFIUM_LINUX_X64_ARCHIVE || '' }}
      MC_PDFIUM_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.pdfium_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_PDFIUM_LINUX_X64_ARCHIVE_SHA256 || '' }}
      PDFIUM_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.pdfium_upstream_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_PDFIUM_LINUX_X64_UPSTREAM_SHA256 || '' }}
      MC_LIBREOFFICE_LINUX_X64_ARCHIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.libreoffice_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_LIBREOFFICE_LINUX_X64_ARCHIVE || '' }}
      MC_LIBREOFFICE_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.libreoffice_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_LIBREOFFICE_LINUX_X64_ARCHIVE_SHA256 || '' }}
      LIBREOFFICE_LINUX_X64_DEB_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.libreoffice_upstream_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_LIBREOFFICE_LINUX_X64_UPSTREAM_SHA256 || '' }}
      MC_PANDOC_LINUX_X64_ARCHIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.pandoc_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_PANDOC_LINUX_X64_ARCHIVE || '' }}
      MC_PANDOC_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.pandoc_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_PANDOC_LINUX_X64_ARCHIVE_SHA256 || '' }}
      PANDOC_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.pandoc_upstream_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_PANDOC_LINUX_X64_UPSTREAM_SHA256 || '' }}
      MC_LIBVIPS_LINUX_X64_ARCHIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_LINUX_X64_ARCHIVE || '' }}
      MC_LIBVIPS_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_LINUX_X64_ARCHIVE_SHA256 || '' }}
      LIBVIPS_LINUX_APT_RUNTIME: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_apt_runtime && '1' || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_LINUX_X64_APT_RUNTIME || '' }}
      OUTPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.output_release_tag || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Linux extraction and smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip tar xz-utils zip dpkg-dev file libvips-tools

      - name: Validate Linux engine source inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$MC_LIBREOFFICE_LINUX_X64_ARCHIVE" || -n "$MC_LIBREOFFICE_LINUX_X64_ARCHIVE_SHA256" ]]; then
            if [[ -z "$MC_LIBREOFFICE_LINUX_X64_ARCHIVE" || -z "$MC_LIBREOFFICE_LINUX_X64_ARCHIVE_SHA256" ]]; then
              echo "Provide both MC_LIBREOFFICE_LINUX_X64_ARCHIVE and MC_LIBREOFFICE_LINUX_X64_ARCHIVE_SHA256, or neither when using LIBREOFFICE_LINUX_X64_DEB_ARCHIVE_SHA256." >&2
              exit 1
            fi
            if [[ -n "$LIBREOFFICE_LINUX_X64_DEB_ARCHIVE_SHA256" ]]; then
              echo "LibreOffice source-tree archive inputs and LIBREOFFICE_LINUX_X64_DEB_ARCHIVE_SHA256 are mutually exclusive." >&2
              exit 1
            fi
          elif [[ -z "$LIBREOFFICE_LINUX_X64_DEB_ARCHIVE_SHA256" ]]; then
            echo "LibreOffice requires either source-tree archive inputs or LIBREOFFICE_LINUX_X64_DEB_ARCHIVE_SHA256 for upstream preparation." >&2
            exit 1
          fi
          if [[ -n "$MC_LIBVIPS_LINUX_X64_ARCHIVE" || -n "$MC_LIBVIPS_LINUX_X64_ARCHIVE_SHA256" ]]; then
            if [[ -z "$MC_LIBVIPS_LINUX_X64_ARCHIVE" || -z "$MC_LIBVIPS_LINUX_X64_ARCHIVE_SHA256" ]]; then
              echo "Provide both MC_LIBVIPS_LINUX_X64_ARCHIVE and MC_LIBVIPS_LINUX_X64_ARCHIVE_SHA256, or neither when using LIBVIPS_LINUX_APT_RUNTIME=1." >&2
              exit 1
            fi
            if [[ "$LIBVIPS_LINUX_APT_RUNTIME" == "1" ]]; then
              echo "libvips source-tree archive inputs and LIBVIPS_LINUX_APT_RUNTIME=1 are mutually exclusive." >&2
              exit 1
            fi
          elif [[ "$LIBVIPS_LINUX_APT_RUNTIME" != "1" ]]; then
            echo "libvips requires either source-tree archive inputs or LIBVIPS_LINUX_APT_RUNTIME=1 for Ubuntu runtime preparation." >&2
            exit 1
          fi
          if [[ -n "$MC_PDFIUM_LINUX_X64_ARCHIVE" || -n "$MC_PDFIUM_LINUX_X64_ARCHIVE_SHA256" ]]; then
            if [[ -z "$MC_PDFIUM_LINUX_X64_ARCHIVE" || -z "$MC_PDFIUM_LINUX_X64_ARCHIVE_SHA256" ]]; then
              echo "Provide both MC_PDFIUM_LINUX_X64_ARCHIVE and MC_PDFIUM_LINUX_X64_ARCHIVE_SHA256, or neither when using PDFIUM_LINUX_X64_ARCHIVE_SHA256." >&2
              exit 1
            fi
            if [[ -n "$PDFIUM_LINUX_X64_ARCHIVE_SHA256" ]]; then
              echo "PDFium source-tree archive inputs and PDFIUM_LINUX_X64_ARCHIVE_SHA256 are mutually exclusive." >&2
              exit 1
            fi
          elif [[ -z "$PDFIUM_LINUX_X64_ARCHIVE_SHA256" ]]; then
            echo "PDFium requires either source-tree archive inputs or PDFIUM_LINUX_X64_ARCHIVE_SHA256 for upstream preparation." >&2
            exit 1
          fi
          if [[ -n "$MC_PANDOC_LINUX_X64_ARCHIVE" || -n "$MC_PANDOC_LINUX_X64_ARCHIVE_SHA256" ]]; then
            if [[ -z "$MC_PANDOC_LINUX_X64_ARCHIVE" || -z "$MC_PANDOC_LINUX_X64_ARCHIVE_SHA256" ]]; then
              echo "Provide both MC_PANDOC_LINUX_X64_ARCHIVE and MC_PANDOC_LINUX_X64_ARCHIVE_SHA256, or neither when using PANDOC_LINUX_X64_ARCHIVE_SHA256." >&2
              exit 1
            fi
            if [[ -n "$PANDOC_LINUX_X64_ARCHIVE_SHA256" ]]; then
              echo "Pandoc source-tree archive inputs and PANDOC_LINUX_X64_ARCHIVE_SHA256 are mutually exclusive." >&2
              exit 1
            fi
          elif [[ -z "$PANDOC_LINUX_X64_ARCHIVE_SHA256" ]]; then
            echo "Pandoc requires either source-tree archive inputs or PANDOC_LINUX_X64_ARCHIVE_SHA256 for upstream preparation." >&2
            exit 1
          fi
          if [[ -n "$OUTPUT_RELEASE_TAG" ]]; then
            if [[ ! "$OUTPUT_RELEASE_TAG" =~ ^[A-Za-z0-9._/-]+$ || "$OUTPUT_RELEASE_TAG" == -* || "$OUTPUT_RELEASE_TAG" == */..* || "$OUTPUT_RELEASE_TAG" == *..* ]]; then
              echo "Invalid Linux engine output release tag input: $OUTPUT_RELEASE_TAG" >&2
              exit 1
            fi
          fi

      - name: Prepare upstream Linux PDFium source tree
        if: ${{ env.PDFIUM_LINUX_X64_ARCHIVE_SHA256 != '' }}
        run: npm run prepare:pdfium-engine:linux

      - name: Prepare upstream Linux LibreOffice source tree
        if: ${{ env.LIBREOFFICE_LINUX_X64_DEB_ARCHIVE_SHA256 != '' }}
        run: npm run prepare:libreoffice-engine:linux

      - name: Prepare upstream Linux Pandoc source tree
        if: ${{ env.PANDOC_LINUX_X64_ARCHIVE_SHA256 != '' }}
        run: npm run prepare:pandoc-engine:linux

      - name: Prepare Ubuntu Linux libvips runtime source tree
        if: ${{ env.LIBVIPS_LINUX_APT_RUNTIME == '1' }}
        run: npm run prepare:libvips-engine:linux

      - name: Prepare Linux engine source trees
        run: npm run prepare:linux-engine-sources -- --allow-existing

      - name: Package Linux engine archives
        run: |
          set -euo pipefail
          if [[ -n "$OUTPUT_RELEASE_TAG" ]]; then
            base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${OUTPUT_RELEASE_TAG}/"
          else
            base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/linux-engine-staging-${GITHUB_RUN_ID}/"
          fi
          npm run package:linux-engines -- --release-base-url "$base_url"

      - name: Collect staged assets
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/mc-linux-engine-assets"
          cp dist-engines-linux/*.zip "$RUNNER_TEMP/mc-linux-engine-assets/"
          cp dist-engines-linux/engines-manifest.json "$RUNNER_TEMP/mc-linux-engine-assets/"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-engine-assets
          path: ${{ runner.temp }}/mc-linux-engine-assets
          if-no-files-found: error

      - name: Upload staged assets to a test release
        if: ${{ env.OUTPUT_RELEASE_TAG != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$OUTPUT_RELEASE_TAG"
          gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes "Linux engine staging assets for Multi-Converter testing." --prerelease || true
          gh release upload "$tag" "$RUNNER_TEMP"/mc-linux-engine-assets/* --repo "$GITHUB_REPOSITORY" --clobber
