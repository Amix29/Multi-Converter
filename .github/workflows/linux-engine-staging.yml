name: Linux Engine Staging

on:
  push:
    branches:
      - codex/test
    paths:
      - ".github/workflows/linux-engine-staging.yml"
      - "scripts/prepare-linux-engine-sources.mjs"
      - "scripts/package-engines.mjs"
      - "tools/engine-packages.linux.config.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      output_release_tag:
        description: "Optional test release tag that will receive the staged Linux engine assets"
        required: false
        default: ""
        type: string
      pdfium_archive_url:
        description: "Maintainer-approved Linux x64 PDFium source-tree archive URL"
        required: true
        type: string
      pdfium_archive_sha256:
        description: "SHA-256 for the Linux x64 PDFium source-tree archive"
        required: true
        type: string
      libreoffice_archive_url:
        description: "Maintainer-approved Linux x64 LibreOffice source-tree archive URL"
        required: true
        type: string
      libreoffice_archive_sha256:
        description: "SHA-256 for the Linux x64 LibreOffice source-tree archive"
        required: true
        type: string
      pandoc_archive_url:
        description: "Maintainer-approved Linux x64 Pandoc source-tree archive URL"
        required: true
        type: string
      pandoc_archive_sha256:
        description: "SHA-256 for the Linux x64 Pandoc source-tree archive"
        required: true
        type: string
      libvips_archive_url:
        description: "Maintainer-approved Linux x64 libvips source-tree archive URL"
        required: true
        type: string
      libvips_archive_sha256:
        description: "SHA-256 for the Linux x64 libvips source-tree archive"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: linux-engine-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stage:
    name: Stage Linux engine release assets
    if: ${{ github.event_name == 'workflow_dispatch' || vars.MC_ENABLE_LINUX_ENGINE_STAGING == '1' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MULTI_CONVERTER_ENGINE_PLATFORM: linux-x64
      MC_PDFIUM_LINUX_X64_ARCHIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.pdfium_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_PDFIUM_LINUX_X64_ARCHIVE || '' }}
      MC_PDFIUM_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.pdfium_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_PDFIUM_LINUX_X64_ARCHIVE_SHA256 || '' }}
      MC_LIBREOFFICE_LINUX_X64_ARCHIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.libreoffice_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_LIBREOFFICE_LINUX_X64_ARCHIVE || '' }}
      MC_LIBREOFFICE_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.libreoffice_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_LIBREOFFICE_LINUX_X64_ARCHIVE_SHA256 || '' }}
      MC_PANDOC_LINUX_X64_ARCHIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.pandoc_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_PANDOC_LINUX_X64_ARCHIVE || '' }}
      MC_PANDOC_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.pandoc_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_PANDOC_LINUX_X64_ARCHIVE_SHA256 || '' }}
      MC_LIBVIPS_LINUX_X64_ARCHIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_archive_url || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_LINUX_X64_ARCHIVE || '' }}
      MC_LIBVIPS_LINUX_X64_ARCHIVE_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.libvips_archive_sha256 || github.event_name != 'workflow_dispatch' && vars.MC_LIBVIPS_LINUX_X64_ARCHIVE_SHA256 || '' }}
      OUTPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.output_release_tag || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Linux extraction and smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip tar zip

      - name: Validate Linux engine source inputs
        shell: bash
        run: |
          set -euo pipefail
          for name in \
            MC_PDFIUM_LINUX_X64_ARCHIVE \
            MC_PDFIUM_LINUX_X64_ARCHIVE_SHA256 \
            MC_LIBREOFFICE_LINUX_X64_ARCHIVE \
            MC_LIBREOFFICE_LINUX_X64_ARCHIVE_SHA256 \
            MC_PANDOC_LINUX_X64_ARCHIVE \
            MC_PANDOC_LINUX_X64_ARCHIVE_SHA256 \
            MC_LIBVIPS_LINUX_X64_ARCHIVE \
            MC_LIBVIPS_LINUX_X64_ARCHIVE_SHA256
          do
            if [[ -z "${!name}" ]]; then
              echo "$name is required for Linux engine staging." >&2
              exit 1
            fi
          done
          if [[ -n "$OUTPUT_RELEASE_TAG" ]]; then
            if [[ ! "$OUTPUT_RELEASE_TAG" =~ ^[A-Za-z0-9._/-]+$ || "$OUTPUT_RELEASE_TAG" == -* || "$OUTPUT_RELEASE_TAG" == */..* || "$OUTPUT_RELEASE_TAG" == *..* ]]; then
              echo "Invalid Linux engine output release tag input: $OUTPUT_RELEASE_TAG" >&2
              exit 1
            fi
          fi

      - name: Prepare Linux engine source trees
        run: npm run prepare:linux-engine-sources

      - name: Package Linux engine archives
        run: |
          set -euo pipefail
          if [[ -n "$OUTPUT_RELEASE_TAG" ]]; then
            base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${OUTPUT_RELEASE_TAG}/"
          else
            base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/linux-engine-staging-${GITHUB_RUN_ID}/"
          fi
          npm run package:linux-engines -- --release-base-url "$base_url"

      - name: Collect staged assets
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/mc-linux-engine-assets"
          cp dist-engines-linux/*.zip "$RUNNER_TEMP/mc-linux-engine-assets/"
          cp dist-engines-linux/engines-manifest.json "$RUNNER_TEMP/mc-linux-engine-assets/"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-engine-assets
          path: ${{ runner.temp }}/mc-linux-engine-assets
          if-no-files-found: error

      - name: Upload staged assets to a test release
        if: ${{ env.OUTPUT_RELEASE_TAG != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$OUTPUT_RELEASE_TAG"
          gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes "Linux engine staging assets for Multi-Converter testing." --prerelease || true
          gh release upload "$tag" "$RUNNER_TEMP"/mc-linux-engine-assets/* --repo "$GITHUB_REPOSITORY" --clobber
