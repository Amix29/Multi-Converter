name: macOS Conversion Matrix

on:
  workflow_dispatch:
    inputs:
      sidecar_release_tag:
        description: "Release tag containing real macOS FFmpeg/ffprobe sidecar binary assets"
        required: false
        default: ""
        type: string
      engine_release_tag:
        description: "Release tag containing macOS engine archives and engines-manifest.json"
        required: false
        default: ""
        type: string
      engine_staging_run_id:
        description: "macOS Engine Staging workflow run ID containing the macos-engine-assets artifact"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: macos-conversions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-conversions:
    name: Real macOS conversion matrix
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MULTI_CONVERTER_ENGINE_PLATFORM: macos-universal
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-macos-conversions-cargo-registry-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-macos-conversions-cargo-registry-v2-
            ${{ runner.os }}-cargo-registry-v2-

      - uses: actions/cache@v4
        with:
          path: src-tauri/bundled-engines
          key: ${{ runner.os }}-macos-conversions-bundled-engines-${{ hashFiles('src-tauri/engines-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-macos-conversions-bundled-engines-

      - run: npm ci

      - name: Configure Cargo target directory
        run: echo "CARGO_TARGET_DIR=$RUNNER_TEMP/mc-cargo-target-macos-conversions" >> "$GITHUB_ENV"

      - name: Validate staged macOS asset inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.engine_staging_run_id }}" && ( -n "${{ inputs.sidecar_release_tag }}" || -n "${{ inputs.engine_release_tag }}" ) ]]; then
            echo "Use either engine_staging_run_id or release tags, not both." >&2
            exit 1
          fi

      - name: Download staged macOS assets from a workflow artifact
        if: ${{ inputs.engine_staging_run_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/mc-macos-engine-assets"
          mkdir -p "$asset_dir" src-tauri/binaries
          gh run download "${{ inputs.engine_staging_run_id }}" --repo "$GITHUB_REPOSITORY" --name macos-engine-assets --dir "$asset_dir"
          for asset in \
            ffmpeg-aarch64-apple-darwin \
            ffmpeg-x86_64-apple-darwin \
            ffprobe-aarch64-apple-darwin \
            ffprobe-x86_64-apple-darwin
          do
            test -s "$asset_dir/$asset"
            cp "$asset_dir/$asset" "src-tauri/binaries/$asset"
          done
          chmod +x src-tauri/binaries/*-apple-darwin
          node scripts/prepare-macos-engine-release-assets.mjs --from-local-assets --asset-dir "$asset_dir"

      - name: Download staged macOS sidecars from a release
        if: ${{ inputs.sidecar_release_tag != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          for asset in \
            ffmpeg-aarch64-apple-darwin \
            ffmpeg-x86_64-apple-darwin \
            ffprobe-aarch64-apple-darwin \
            ffprobe-x86_64-apple-darwin
          do
            gh release download "${{ inputs.sidecar_release_tag }}" --repo "$GITHUB_REPOSITORY" --pattern "$asset" --dir src-tauri/binaries
          done
          chmod +x src-tauri/binaries/*-apple-darwin

      - name: Download staged macOS engine archives from a release
        if: ${{ inputs.engine_release_tag != '' }}
        run: node scripts/prepare-macos-engine-release-assets.mjs --tag "${{ inputs.engine_release_tag }}" --repo "$GITHUB_REPOSITORY"

      - name: Run strict macOS conversion validation
        run: npm run test:macos:conversions
