name: macOS Conversion Matrix

on:
  push:
    branches:
      - codex/test
    paths:
      - ".github/workflows/macos-conversions.yml"
      - "scripts/prepare-macos-engine-release-assets.mjs"
      - "scripts/validate-bundled-engines.mjs"
      - "scripts/lib/ffmpeg-version.mjs"
      - "scripts/test-macos-host.mjs"
      - "scripts/test-macos-conversions.mjs"
      - "scripts/test-github-workflows.mjs"
      - "src-tauri/src/converters.rs"
      - "src-tauri/src/engine_distribution.rs"
      - "src-tauri/src/registry.rs"
  workflow_dispatch:
    inputs:
      sidecar_release_tag:
        description: "Release tag containing real macOS FFmpeg/ffprobe sidecar binary assets"
        required: false
        default: ""
        type: string
      engine_release_tag:
        description: "Release tag containing macOS engine archives and engines-manifest.json"
        required: false
        default: ""
        type: string
      engine_staging_run_id:
        description: "macOS Engine Staging workflow run ID containing the macos-engine-assets artifact"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: macos-conversions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-conversions:
    name: Real macOS conversion matrix (${{ matrix.arch_label }})
    if: ${{ github.event_name == 'workflow_dispatch' || vars.MC_ENABLE_MACOS_CONVERSIONS == '1' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            arch_label: Apple Silicon
            runner: macos-latest
          - arch: x86_64
            arch_label: Intel
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MULTI_CONVERTER_ENGINE_PLATFORM: macos-universal
      MACOS_CONVERSION_ARCH: ${{ matrix.arch }}
      SIDECAR_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.sidecar_release_tag || '' }}
      ENGINE_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.engine_release_tag || '' }}
      ENGINE_STAGING_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.engine_staging_run_id || github.event_name != 'workflow_dispatch' && vars.MC_MACOS_ENGINE_STAGING_RUN_ID || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-macos-conversions-cargo-registry-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-macos-conversions-cargo-registry-v2-
            ${{ runner.os }}-cargo-registry-v2-

      - uses: actions/cache@v4
        with:
          path: src-tauri/bundled-engines
          key: ${{ runner.os }}-macos-conversions-bundled-engines-${{ env.ENGINE_STAGING_RUN_ID || env.ENGINE_RELEASE_TAG || 'embedded-manifest' }}-${{ hashFiles('src-tauri/engines-manifest.json') }}

      - run: npm ci

      - name: Configure Cargo target directory
        run: echo "CARGO_TARGET_DIR=$RUNNER_TEMP/mc-cargo-target-macos-conversions" >> "$GITHUB_ENV"

      - name: Validate staged macOS asset inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$ENGINE_STAGING_RUN_ID" && ( -n "$SIDECAR_RELEASE_TAG" || -n "$ENGINE_RELEASE_TAG" ) ]]; then
            echo "Use either engine_staging_run_id or release tags, not both." >&2
            exit 1
          fi
          if [[ -n "$ENGINE_STAGING_RUN_ID" && ! "$ENGINE_STAGING_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "engine_staging_run_id must be a numeric GitHub Actions run ID." >&2
            exit 1
          fi
          for tag in "$SIDECAR_RELEASE_TAG" "$ENGINE_RELEASE_TAG"; do
            if [[ -n "$tag" && ( ! "$tag" =~ ^[A-Za-z0-9._/-]+$ || "$tag" == -* || "$tag" == */..* || "$tag" == *..* ) ]]; then
              echo "Invalid release tag input: $tag" >&2
              exit 1
            fi
          done

      - name: Download staged macOS assets from a workflow artifact
        if: ${{ env.ENGINE_STAGING_RUN_ID != '' }}
        uses: actions/download-artifact@v4
        with:
          name: macos-engine-assets
          path: ${{ runner.temp }}/mc-macos-engine-assets
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ env.ENGINE_STAGING_RUN_ID }}

      - name: Validate staged macOS assets from a workflow artifact
        if: ${{ env.ENGINE_STAGING_RUN_ID != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/mc-macos-engine-assets"
          mkdir -p "$asset_dir" src-tauri/binaries
          run_info="$(gh run view "$ENGINE_STAGING_RUN_ID" --repo "$GITHUB_REPOSITORY" --json conclusion,name --jq '.name + "|" + .conclusion')"
          if [[ "$run_info" != "macOS Engine Staging|success" ]]; then
            echo "engine_staging_run_id must reference a successful macOS Engine Staging run. Got: $run_info" >&2
            exit 1
          fi
          if [[ ! -s "$asset_dir/ffmpeg-aarch64-apple-darwin" ]]; then
            nested_asset="$(find "$asset_dir" -mindepth 1 -maxdepth 3 -type f -name ffmpeg-aarch64-apple-darwin -print -quit)"
            if [[ -n "$nested_asset" ]]; then
              asset_dir="$(dirname "$nested_asset")"
            fi
          fi
          echo "Using staged macOS asset directory: $asset_dir"
          for asset in \
            ffmpeg-aarch64-apple-darwin \
            ffmpeg-x86_64-apple-darwin \
            ffprobe-aarch64-apple-darwin \
            ffprobe-x86_64-apple-darwin
          do
            test -s "$asset_dir/$asset"
            test -s "$asset_dir/$asset.sha256"
            (cd "$asset_dir" && shasum -a 256 -c "$asset.sha256")
            cp "$asset_dir/$asset" "src-tauri/binaries/$asset"
          done
          chmod +x src-tauri/binaries/*-apple-darwin
          node scripts/prepare-macos-engine-release-assets.mjs --from-local-assets --asset-dir "$asset_dir"

      - name: Download staged macOS sidecars from a release
        if: ${{ env.SIDECAR_RELEASE_TAG != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          for asset in \
            ffmpeg-aarch64-apple-darwin \
            ffmpeg-x86_64-apple-darwin \
            ffprobe-aarch64-apple-darwin \
            ffprobe-x86_64-apple-darwin
          do
            gh release download "$SIDECAR_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$asset" --dir src-tauri/binaries
            gh release download "$SIDECAR_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$asset.sha256" --dir src-tauri/binaries
            (cd src-tauri/binaries && shasum -a 256 -c "$asset.sha256")
          done
          chmod +x src-tauri/binaries/*-apple-darwin

      - name: Download staged macOS engine archives from a release
        if: ${{ env.ENGINE_RELEASE_TAG != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/prepare-macos-engine-release-assets.mjs --tag "$ENGINE_RELEASE_TAG" --repo "$GITHUB_REPOSITORY"

      - name: Run strict macOS conversion validation
        run: npm run test:macos:conversions
