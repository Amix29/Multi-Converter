name: macOS DMG Build

on:
  push:
    branches:
      - codex/test
    paths:
      - ".github/workflows/macos-dmg.yml"
      - "scripts/prepare-macos-engine-release-assets.mjs"
      - "scripts/prepare-macos-dmg-artifact.mjs"
      - "scripts/prepare-macos-release-artifacts.mjs"
      - "scripts/validate-bundled-engines.mjs"
      - "scripts/lib/ffmpeg-version.mjs"
      - "scripts/test-macos-host.mjs"
      - "scripts/test-macos-packaging.mjs"
      - "scripts/verify-macos-dmg.mjs"
      - "scripts/test-github-workflows.mjs"
      - "src-tauri/src/converters.rs"
      - "src-tauri/src/engine_distribution.rs"
      - "src-tauri/src/registry.rs"
      - "src-tauri/tauri.macos.conf.json"
      - "src-tauri/tauri.conf.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      sidecar_release_tag:
        description: "Optional release tag containing macOS FFmpeg/ffprobe sidecar binary assets"
        required: false
        default: ""
        type: string
      engine_release_tag:
        description: "Optional release tag containing macOS engine archives and engines-manifest.json"
        required: false
        default: ""
        type: string
      engine_staging_run_id:
        description: "Optional macOS Engine Staging workflow run ID containing the macos-engine-assets artifact"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: macos-dmg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build verified universal DMG
    if: ${{ github.event_name == 'workflow_dispatch' || vars.MC_ENABLE_MACOS_DMG == '1' }}
    runs-on: macos-latest
    timeout-minutes: 120
    outputs:
      version: ${{ steps.version.outputs.version }}
      dmg_name: ${{ steps.version.outputs.dmg_name }}
      updater_archive_name: ${{ steps.version.outputs.updater_archive_name }}
      updater_signature_name: ${{ steps.version.outputs.updater_signature_name }}
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MULTI_CONVERTER_ENGINE_PLATFORM: macos-universal
      SIDECAR_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.sidecar_release_tag || '' }}
      ENGINE_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.engine_release_tag || '' }}
      ENGINE_STAGING_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.engine_staging_run_id || github.event_name != 'workflow_dispatch' && vars.MC_MACOS_ENGINE_STAGING_RUN_ID || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-macos-dmg-cargo-registry-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-macos-dmg-cargo-registry-v2-
            ${{ runner.os }}-cargo-registry-v2-

      - run: npm ci

      - name: Configure Cargo target directory
        run: echo "CARGO_TARGET_DIR=$RUNNER_TEMP/mc-cargo-target-macos-dmg" >> "$GITHUB_ENV"

      - name: Validate staged macOS asset inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$ENGINE_STAGING_RUN_ID" && ( -n "$SIDECAR_RELEASE_TAG" || -n "$ENGINE_RELEASE_TAG" ) ]]; then
            echo "Use either engine_staging_run_id or release tags, not both." >&2
            exit 1
          fi
          if [[ -n "$ENGINE_STAGING_RUN_ID" && ! "$ENGINE_STAGING_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "engine_staging_run_id must be a numeric GitHub Actions run ID." >&2
            exit 1
          fi
          for tag in "$SIDECAR_RELEASE_TAG" "$ENGINE_RELEASE_TAG"; do
            if [[ -n "$tag" && ( ! "$tag" =~ ^[A-Za-z0-9._/-]+$ || "$tag" == -* || "$tag" == */..* || "$tag" == *..* ) ]]; then
              echo "Invalid release tag input: $tag" >&2
              exit 1
            fi
          done

      - name: Download staged macOS assets from a workflow artifact
        if: ${{ env.ENGINE_STAGING_RUN_ID != '' }}
        uses: actions/download-artifact@v4
        with:
          name: macos-engine-assets
          path: ${{ runner.temp }}/mc-macos-engine-assets
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ env.ENGINE_STAGING_RUN_ID }}

      - name: Validate staged macOS assets from a workflow artifact
        if: ${{ env.ENGINE_STAGING_RUN_ID != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/mc-macos-engine-assets"
          mkdir -p "$asset_dir" src-tauri/binaries
          run_info="$(gh run view "$ENGINE_STAGING_RUN_ID" --repo "$GITHUB_REPOSITORY" --json conclusion,name --jq '.name + "|" + .conclusion')"
          if [[ "$run_info" != "macOS Engine Staging|success" ]]; then
            echo "engine_staging_run_id must reference a successful macOS Engine Staging run. Got: $run_info" >&2
            exit 1
          fi
          for asset in \
            ffmpeg-aarch64-apple-darwin \
            ffmpeg-x86_64-apple-darwin \
            ffmpeg-universal-apple-darwin \
            ffprobe-aarch64-apple-darwin \
            ffprobe-x86_64-apple-darwin \
            ffprobe-universal-apple-darwin
          do
            test -s "$asset_dir/$asset"
            test -s "$asset_dir/$asset.sha256"
            (cd "$asset_dir" && shasum -a 256 -c "$asset.sha256")
            cp "$asset_dir/$asset" "src-tauri/binaries/$asset"
          done
          chmod +x src-tauri/binaries/*-apple-darwin
          node scripts/prepare-macos-engine-release-assets.mjs --from-local-assets --asset-dir "$asset_dir"

      - name: Download staged macOS sidecars from a release
        if: ${{ env.SIDECAR_RELEASE_TAG != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          for asset in \
            ffmpeg-aarch64-apple-darwin \
            ffmpeg-x86_64-apple-darwin \
            ffprobe-aarch64-apple-darwin \
            ffprobe-x86_64-apple-darwin
          do
            gh release download "$SIDECAR_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$asset" --dir src-tauri/binaries
            gh release download "$SIDECAR_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$asset.sha256" --dir src-tauri/binaries
            (cd src-tauri/binaries && shasum -a 256 -c "$asset.sha256")
          done
          for asset in \
            ffmpeg-universal-apple-darwin \
            ffprobe-universal-apple-darwin
          do
            gh release download "$SIDECAR_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$asset" --dir src-tauri/binaries || true
            gh release download "$SIDECAR_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$asset.sha256" --dir src-tauri/binaries || true
            if [[ -f "src-tauri/binaries/$asset" ]]; then
              test -s "src-tauri/binaries/$asset.sha256"
              (cd src-tauri/binaries && shasum -a 256 -c "$asset.sha256")
            fi
          done
          chmod +x src-tauri/binaries/*-apple-darwin

      - name: Download staged macOS engine archives from a release
        if: ${{ env.ENGINE_RELEASE_TAG != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/prepare-macos-engine-release-assets.mjs --tag "$ENGINE_RELEASE_TAG" --repo "$GITHUB_REPOSITORY"

      - name: Validate macOS build prerequisites
        run: |
          npm run test:macos-packaging
          npm run test:run-tauri
          npm run test:macos-dmg-artifact

      - name: Prepare and verify staged macOS engines
        run: |
          npm run prepare:bundled-engines
          npm run test:macos:host

      - name: Run macOS host tests
        run: |
          npm run test:rust
          npm run test:pdfium-wrapper:compile
          npm run clippy:pdfium-wrapper

      - name: Build universal DMG and updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build:macos

      - id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dmg_name=Multi-Converter_${version}_macos-universal.dmg" >> "$GITHUB_OUTPUT"
          echo "updater_archive_name=Multi-Converter_${version}_macos-universal.app.tar.gz" >> "$GITHUB_OUTPUT"
          echo "updater_signature_name=Multi-Converter_${version}_macos-universal.app.tar.gz.sig" >> "$GITHUB_OUTPUT"

      - name: Prepare release-named macOS artifacts
        run: npm run prepare:macos-release-artifacts -- --version "${{ steps.version.outputs.version }}" --out-dir "$RUNNER_TEMP/mc-macos-release-artifacts"

      - name: Verify final DMG
        run: npm run verify:macos-dmg -- --version "${{ steps.version.outputs.version }}" --dmg "$RUNNER_TEMP/mc-macos-release-artifacts/${{ steps.version.outputs.dmg_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifacts
          path: |
            ${{ runner.temp }}/mc-macos-release-artifacts/${{ steps.version.outputs.dmg_name }}
            ${{ runner.temp }}/mc-macos-release-artifacts/Multi-Converter_macos-universal.dmg
            ${{ runner.temp }}/mc-macos-release-artifacts/${{ steps.version.outputs.updater_archive_name }}
            ${{ runner.temp }}/mc-macos-release-artifacts/${{ steps.version.outputs.updater_signature_name }}
          if-no-files-found: error

  verify-intel:
    name: Verify universal DMG on Intel
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: macos-15-intel
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          name: macos-release-artifacts
          path: ${{ runner.temp }}/mc-macos-release-artifacts

      - name: Verify final DMG on Intel
        run: npm run verify:macos-dmg -- --version "${{ needs.build.outputs.version }}" --dmg "$RUNNER_TEMP/mc-macos-release-artifacts/${{ needs.build.outputs.dmg_name }}"
