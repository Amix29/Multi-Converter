name: macOS DMG Build

on:
  workflow_dispatch:
    inputs:
      sidecar_release_tag:
        description: "Optional release tag containing macOS FFmpeg/ffprobe sidecar binary assets"
        required: false
        default: ""
        type: string
      engine_release_tag:
        description: "Optional release tag containing macOS engine archives and engines-manifest.json"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: macos-dmg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build verified universal DMG
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MULTI_CONVERTER_ENGINE_PLATFORM: macos-universal
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-macos-dmg-cargo-registry-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-macos-dmg-cargo-registry-v2-
            ${{ runner.os }}-cargo-registry-v2-

      - run: npm ci

      - name: Configure Cargo target directory
        run: echo "CARGO_TARGET_DIR=$RUNNER_TEMP/mc-cargo-target-macos-dmg" >> "$GITHUB_ENV"

      - name: Download staged macOS sidecars from a release
        if: ${{ inputs.sidecar_release_tag != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          for asset in \
            ffmpeg-aarch64-apple-darwin \
            ffmpeg-x86_64-apple-darwin \
            ffprobe-aarch64-apple-darwin \
            ffprobe-x86_64-apple-darwin
          do
            gh release download "${{ inputs.sidecar_release_tag }}" --repo "$GITHUB_REPOSITORY" --pattern "$asset" --dir src-tauri/binaries
          done
          for asset in \
            ffmpeg-universal-apple-darwin \
            ffprobe-universal-apple-darwin
          do
            gh release download "${{ inputs.sidecar_release_tag }}" --repo "$GITHUB_REPOSITORY" --pattern "$asset" --dir src-tauri/binaries || true
          done
          chmod +x src-tauri/binaries/*-apple-darwin

      - name: Download staged macOS engine archives from a release
        if: ${{ inputs.engine_release_tag != '' }}
        shell: bash
        run: |
          set -euo pipefail
          engine_dir="$RUNNER_TEMP/mc-macos-engine-assets"
          cache_dir="engine-sources/.bundled-engine-cache"
          mkdir -p "$engine_dir" "$cache_dir"
          gh release download "${{ inputs.engine_release_tag }}" --repo "$GITHUB_REPOSITORY" --pattern engines-manifest.json --dir "$engine_dir"
          cp "$engine_dir/engines-manifest.json" src-tauri/engines-manifest.json
          node --input-type=module <<'NODE' > "$RUNNER_TEMP/mc-macos-engine-assets.tsv"
          import fs from "node:fs";
          import path from "node:path";

          const manifest = JSON.parse(fs.readFileSync("src-tauri/engines-manifest.json", "utf8"));
          const rows = [];
          for (const engine of manifest.engines ?? []) {
            if (engine.platform !== "macos-universal") continue;
            const assetName = decodeURIComponent(path.posix.basename(new URL(engine.downloadUrl).pathname));
            rows.push([engine.id, engine.version, assetName].join("\t"));
          }
          if (rows.length === 0) {
            console.error("No macos-universal engine entries found in staged engines-manifest.json.");
            process.exit(1);
          }
          console.log(rows.join("\n"));
          NODE
          while IFS=$'\t' read -r engine_id engine_version asset_name; do
            [[ -n "$engine_id" ]] || continue
            gh release download "${{ inputs.engine_release_tag }}" --repo "$GITHUB_REPOSITORY" --pattern "$asset_name" --dir "$engine_dir"
            cp "$engine_dir/$asset_name" "$cache_dir/${engine_id}-${engine_version}.zip"
          done < "$RUNNER_TEMP/mc-macos-engine-assets.tsv"

      - name: Validate macOS build prerequisites
        run: |
          npm run test:macos-packaging
          npm run test:run-tauri
          npm run test:macos-dmg-artifact

      - name: Prepare and verify staged macOS engines
        run: |
          npm run prepare:bundled-engines
          npm run test:macos:host

      - name: Run macOS host tests
        run: |
          npm run test:rust
          npm run test:pdfium-wrapper:compile
          npm run clippy:pdfium-wrapper

      - name: Build universal DMG
        run: npm run tauri:build:macos

      - id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dmg_name=Multi-Converter_${version}_macos-universal.dmg" >> "$GITHUB_OUTPUT"

      - name: Prepare release-named DMG artifact
        run: npm run prepare:macos-dmg-artifact -- --version "${{ steps.version.outputs.version }}" --out-dir "$RUNNER_TEMP/mc-macos-dmg-artifact"

      - name: Verify final DMG
        run: npm run verify:macos-dmg -- --version "${{ steps.version.outputs.version }}" --dmg "$RUNNER_TEMP/mc-macos-dmg-artifact/${{ steps.version.outputs.dmg_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.dmg_name }}
          path: ${{ runner.temp }}/mc-macos-dmg-artifact/${{ steps.version.outputs.dmg_name }}
          if-no-files-found: error
