name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-v2-

      - uses: actions/cache@v4
        with:
          path: src-tauri/bundled-engines
          key: ${{ runner.os }}-bundled-engines-${{ hashFiles('src-tauri/engines-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-bundled-engines-

      - run: npm ci
      - run: npm audit --omit=dev
      - run: cargo install cargo-audit --locked
      - run: npm run prepare:bundled-engines
      - run: npm run check
      - run: npm run fmt:rust:check
      - run: npm run clippy:rust
      - run: npm run audit:rust
      - run: npm run validate:engines
      - run: npm run test:rust
      - run: npm run test:conversions
      - run: npm run test:pdfium-wrapper
      - run: npm run clippy:pdfium-wrapper
      - run: npm run tauri:build
